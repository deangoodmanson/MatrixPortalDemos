# LED Portal Pro - macOS Configuration

matrix:
  width: 64
  height: 32

camera:
  width: 640
  height: 480
  index: 0
  prefer_picamera: false  # macOS doesn't have picamera

transport:
  baud_rate: 4000000
  timeout: 0.1
  write_timeout: 0.5
  frame_header: "IMG1"

processing:
  interpolation: "linear"
  enable_gamma_correction: false
  gamma: 2.2

ui:
  countdown_duration: 0.5
  snapshot_pause_duration: 3.0
  enable_frame_limiting: false
  show_preview: true

target_fps: 30
debug_save_frames: false
