# LED Portal Pro - Raspberry Pi Configuration

matrix:
  width: 64
  height: 32

camera:
  width: 640
  height: 480
  index: 0
  prefer_picamera: true  # Prefer Pi Camera on Raspberry Pi

transport:
  baud_rate: 4000000
  timeout: 0.1
  write_timeout: 0.5
  frame_header: "IMG1"

processing:
  interpolation: "linear"
  enable_gamma_correction: false
  gamma: 2.2
  max_brightness: 255  # Full brightness (0-255; reduce to e.g. 128 for USB power safety)

ui:
  countdown_duration: 0.5
  snapshot_pause_duration: 5.0
  enable_frame_limiting: true  # CRITICAL: Enable to prevent buffer overflow
  show_preview: false

target_fps: 15  # Reduced from 30 to be conservative on Pi (especially USB-powered)
debug_save_frames: false

# ── A0 Hardware Snap Button ───────────────────────────────────────────────────
# Physical shutter button wired to the A0 pin on the Matrix Portal JST connector.
# When pressed, the device prints "SNAP" to its CDC console port and ledportal
# triggers an instant snapshot (no countdown) from the last frame on the device.
#
# NOTE: Opening the console port prevents terminal/REPL access to the device
# while ledportal is running.  Set a0_snap_button: false to restore REPL access.
#
# To find your console port on Linux/Pi:
#   ls /dev/ttyACM*   (before and after plugging in — the NEW lower-numbered
#                      entry is the console port; the higher one is data)
#   e.g. /dev/ttyACM0 = console,  /dev/ttyACM1 = data (frame stream)
#
a0_snap_button: true        # Set to false to disable and restore REPL access
console_port: null          # e.g. /dev/ttyACM0 — set to enable A0 snap button
